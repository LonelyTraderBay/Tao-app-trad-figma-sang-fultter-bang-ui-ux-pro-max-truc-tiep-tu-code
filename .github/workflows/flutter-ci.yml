# CI-D2 (A-Plus GĐ2): pipeline song song thay cho 1 job ~50 bước tuần tự.
#
# Sơ đồ job:
#   static ──┐
#   guardrails ─┤
#   tests (shard 0..2, --coverage) ─┼──> gate "Enterprise Flutter Gates"
#   build-android (flavor dev) ─┤      (tên GIỮ NGUYÊN — required check của
#   secret-scan (gitleaks) ──┘          branch protection main trỏ vào tên này)
#
# Gate dùng if: always() + bước tự fail khi có job thành phần đỏ/hủy/skip —
# nếu để gate bị "skipped" thì branch protection của GitHub tính skip là ĐẠT
# và PR đỏ vẫn merge được (bẫy đã biết). Gate cũng là nơi hợp nhất lcov các
# shard và chạy sàn coverage (CI-D3, tool/coverage_floor.dart).
#
# Action pin theo SHA (CI-D4); comment ghi tag tương ứng — dependabot
# (github-actions ecosystem) sẽ tự đề xuất nâng cả SHA lẫn comment.
name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static & audit artifacts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Route coverage artifact is current
        run: dart run tool/route_coverage_audit.dart --check

      - name: Navigation edge artifact is current
        run: dart run tool/navigation_edge_audit.dart --check

      - name: Design token consistency artifact is current
        run: dart run tool/design_token_consistency_audit.dart --check

      - name: Upload design token consistency reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: design-token-consistency-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Design-Token-Consistency-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Design-Token-Consistency-Audit.csv
          if-no-files-found: error

      - name: Spacing token duplication artifact is current
        run: dart run tool/spacing_token_duplication_audit.dart --check

      - name: Upload spacing token duplication reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: spacing-token-duplication-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Spacing-Token-Duplication-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Spacing-Token-Duplication-Audit.csv
          if-no-files-found: error

      - name: Page content width artifact is current
        run: dart run tool/page_content_width_audit.dart --check

      - name: Upload page content width reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: page-content-width-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Content-Width-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Content-Width-Audit.csv
          if-no-files-found: error

      - name: Home reference consistency artifact is current
        run: dart run tool/home_reference_consistency_audit.dart --check

      - name: Upload home reference consistency reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: home-reference-consistency-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Home-Reference-Consistency-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Home-Reference-Consistency-Audit.csv
          if-no-files-found: error

      - name: Page rhythm audit artifact is current
        run: dart run tool/page_rhythm_audit.dart --check --strict-full

      - name: Page rhythm screen compliance rollup is current
        run: dart run tool/page_rhythm_screen_rollup.dart --check --strict-layout

      - name: Page rhythm coverage matrix is current
        run: dart run tool/page_rhythm_coverage_matrix.dart --check

      - name: Upload page rhythm audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: page-rhythm-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Rhythm-Audit.csv
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Rhythm-Screen-Compliance.csv
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Rhythm-Coverage-Matrix.csv
          if-no-files-found: error

      - name: Card tile audit artifact is current
        run: dart run tool/card_tile_audit.dart --check --strict-full

      - name: Card tile migration manifest is current
        run: dart run tool/card_tile_manifest.dart --check

      - name: Upload card tile audit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: card-tile-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Card-Tile-Audit.csv
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Card-Tile-Migration-Manifest.csv
            docs/02_FLUTTER_MIGRATION/audits/Card-Tile-Compliance-Report.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Card-Tile-Manifest.csv
          if-no-files-found: error

      - name: Segment pill audit artifact is current
        run: dart run tool/segment_pill_audit.dart --check --strict-full

      - name: Segment pill migration manifest is current
        run: dart run tool/segment_pill_manifest.dart --check

      - name: Upload segment pill audit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: segment-pill-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Segment-Pill-Audit.csv
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Segment-Pill-Migration-Manifest.csv
            docs/02_FLUTTER_MIGRATION/audits/Segment-Pill-Compliance-Report.md
          if-no-files-found: error

      - name: Top header behavior artifact is current
        run: dart run tool/top_header_behavior_audit.dart --check --strict

      - name: Upload top header behavior audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: top-header-behavior-audit
          path: docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Behavior-Audit.md
          if-no-files-found: error

      - name: Top header action artifacts are current
        run: dart run tool/top_header_action_audit.dart --check --strict

      - name: Upload top header action audit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: top-header-action-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Action-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Action-Audit.csv
          if-no-files-found: error

      - name: Top header global access policy artifacts are current
        run: dart run tool/top_header_global_access_policy_audit.dart --check --strict

      - name: Upload top header global access policy audit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: top-header-global-access-policy-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Global-Access-Policy-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Global-Access-Policy-Audit.csv
          if-no-files-found: error

      - name: Top header visual archetype artifacts are current
        run: dart run tool/top_header_visual_archetype_audit.dart --check --strict

      - name: Upload top header visual archetype audit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: top-header-visual-archetype-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Visual-Archetype-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Visual-Archetype-Audit.csv
          if-no-files-found: error

      - name: Back navigation behavior artifacts are current
        run: dart run tool/back_navigation_behavior_audit.dart --check --strict

      - name: Upload back navigation behavior audit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: back-navigation-behavior-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Header-Back-Navigation-Behavior-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Header-Back-Navigation-Behavior-Audit.csv
          if-no-files-found: error

      - name: Home entry back navigation artifacts are current
        run: dart run tool/home_entry_back_navigation_audit.dart --check

      - name: Upload home entry back navigation audit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: home-entry-back-navigation-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Home-Entry-Back-Navigation-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Home-Entry-Back-Navigation-Audit.csv
          if-no-files-found: error

      - name: Duplicate private widget artifact is current
        run: dart run tool/duplicate_private_widget_audit.dart --check

      - name: Upload duplicate private widget audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: duplicate-private-widget-audit
          path: docs/02_FLUTTER_MIGRATION/audits/VitTrade-Duplicate-Private-Widget-Audit.csv
          if-no-files-found: error

  guardrails:
    # Toàn bộ test/quality + router contracts + golden trong MỘT bước quét
    # thư mục — guardrail mới tự động được phủ, không cần nhớ thêm step
    # (danh sách step liệt kê tay từng bị drift). Các test này chạy lại trong
    # full suite (shard) — trùng lặp có chủ đích để có tín hiệu nhanh ~3 phút.
    name: Guardrails & router contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Quality guardrails, router contracts, goldens
        run: >
          flutter test
          test/quality
          test/app/router
          test/features/home/golden
          test/features/trade/golden
          test/features/wallet/golden
          test/features/p2p/golden
          test/features/earn/golden
          --reporter=compact

  tests:
    name: Full test suite (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [0, 1, 2]
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Full test suite shard (with coverage)
        run: >
          flutter test
          --coverage
          --total-shards 3
          --shard-index ${{ matrix.shard }}
          --reporter=compact

      - name: Upload shard coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: flutter_app/coverage/lcov.info
          if-no-files-found: error

  build-android:
    name: Build Android APK (flavor dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('flutter_app/android/**/*.gradle*', 'flutter_app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      # CI-D6: build theo flavor dev (applicationId suffix .dev) — chứng minh
      # productFlavors hoạt động trên CI, không đụng signing guard (debug).
      - name: Build debug APK (flavor dev)
        run: flutter build apk --debug --flavor dev

  secret-scan:
    # CI-D4/SEC-S41: quét secret bằng gitleaks trên các commit của PR/push.
    # .gitleaks.toml (repo root) allowlist marker VI_DU_KHONG_THAT của fixture.
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # gitleaks-action gọi API liệt kê commit của PR — GITHUB_TOKEN cần thêm
    # pull-requests: read, nếu không sẽ chết "Resource not accessible by
    # integration" trước cả khi quét (permissions job-level GHI ĐÈ toàn bộ
    # khối workflow-level nên phải khai lại contents: read).
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gate:
    # Job tổng hợp — TÊN PHẢI GIỮ "Enterprise Flutter Gates": đây là required
    # status check của branch protection main. if: always() + bước tự fail
    # bên dưới đảm bảo job này luôn CHẠY và đỏ thật khi có job thành phần đỏ
    # (nếu để bị skip, branch protection tính skip là đạt và PR đỏ vẫn merge
    # được). Đồng thời hợp nhất lcov 3 shard và chạy sàn coverage (CI-D3).
    name: Enterprise Flutter Gates
    runs-on: ubuntu-latest
    needs: [static, guardrails, tests, build-android, secret-scan]
    if: always()
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: All component jobs must be green
        working-directory: .
        run: |
          echo 'static:        ${{ needs.static.result }}'
          echo 'guardrails:    ${{ needs.guardrails.result }}'
          echo 'tests:         ${{ needs.tests.result }}'
          echo 'build-android: ${{ needs.build-android.result }}'
          echo 'secret-scan:   ${{ needs.secret-scan.result }}'
          if [ '${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}' = 'true' ]; then
            echo 'Co job thanh phan khong xanh — gate FAIL.'
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Download shard coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-shard-*
          path: flutter_app/coverage-shards

      - name: Coverage floor (CI-D3)
        run: >
          dart run tool/coverage_floor.dart
          coverage-shards/coverage-shard-0/lcov.info
          coverage-shards/coverage-shard-1/lcov.info
          coverage-shards/coverage-shard-2/lcov.info
