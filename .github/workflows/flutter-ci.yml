name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Enterprise Flutter Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Route coverage artifact is current
        run: dart run tool/route_coverage_audit.dart --check

      - name: Navigation edge artifact is current
        run: dart run tool/navigation_edge_audit.dart --check

      - name: Analyze
        run: flutter analyze

      - name: Router contracts
        run: flutter test test/app/router --reporter=compact

      - name: Navigation route guardrails
        run: flutter test test/quality/navigation_route_guardrails_test.dart --reporter=compact

      - name: Architecture guardrails
        run: flutter test test/quality/architecture_baseline_guardrails_test.dart --reporter=compact

      - name: Design token consistency artifact is current
        run: dart run tool/design_token_consistency_audit.dart --check

      - name: Upload design token consistency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: design-token-consistency-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Design-Token-Consistency-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Design-Token-Consistency-Audit.csv
          if-no-files-found: error

      - name: Design token consistency guardrails
        run: flutter test test/quality/design_token_consistency_guardrail_test.dart --reporter=compact

      - name: Spacing token duplication artifact is current
        run: dart run tool/spacing_token_duplication_audit.dart --check

      - name: Upload spacing token duplication reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spacing-token-duplication-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Spacing-Token-Duplication-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Spacing-Token-Duplication-Audit.csv
          if-no-files-found: error

      - name: Spacing token duplication guardrails
        run: flutter test test/quality/spacing_token_duplication_guardrail_test.dart --reporter=compact

      - name: Page content width artifact is current
        run: dart run tool/page_content_width_audit.dart --check

      - name: Upload page content width reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: page-content-width-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Content-Width-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Content-Width-Audit.csv
          if-no-files-found: error

      - name: Page content width guardrails
        run: flutter test test/quality/page_content_width_guardrail_test.dart --reporter=compact

      - name: Home reference consistency artifact is current
        run: dart run tool/home_reference_consistency_audit.dart --check

      - name: Upload home reference consistency reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: home-reference-consistency-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Home-Reference-Consistency-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Home-Reference-Consistency-Audit.csv
          if-no-files-found: error

      - name: Home reference consistency guardrails
        run: flutter test test/quality/home_reference_consistency_guardrail_test.dart --reporter=compact

      - name: Home golden tests
        run: flutter test test/features/home/golden/ --reporter=compact

      - name: Page rhythm audit artifact is current
        run: dart run tool/page_rhythm_audit.dart --check --strict-full

      - name: Page rhythm screen compliance rollup is current
        run: dart run tool/page_rhythm_screen_rollup.dart --check --strict-layout

      - name: Page rhythm coverage matrix is current
        run: dart run tool/page_rhythm_coverage_matrix.dart --check

      - name: Upload page rhythm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: page-rhythm-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Rhythm-Audit.csv
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Rhythm-Screen-Compliance.csv
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Page-Rhythm-Coverage-Matrix.csv
          if-no-files-found: error

      - name: Page rhythm guardrails
        run: flutter test test/quality/page_rhythm_guardrail_test.dart --reporter=compact

      - name: Page rhythm phone visual QA @ 360x800
        run: flutter test test/quality/page_rhythm_phone_visual_qa_test.dart --reporter=compact

      - name: Card tile audit artifact is current
        run: dart run tool/card_tile_audit.dart --check --strict-full

      - name: Card tile migration manifest is current
        run: dart run tool/card_tile_manifest.dart --check

      - name: Upload card tile audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: card-tile-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Card-Tile-Audit.csv
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Card-Tile-Migration-Manifest.csv
            docs/02_FLUTTER_MIGRATION/audits/Card-Tile-Compliance-Report.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Card-Tile-Manifest.csv
          if-no-files-found: error

      - name: Card tile guardrails
        run: flutter test test/quality/card_tile_guardrail_test.dart --reporter=compact

      - name: Service tile badge guardrails
        run: flutter test test/quality/service_tile_badge_guardrail_test.dart --reporter=compact

      - name: Task card guardrails
        run: flutter test test/quality/task_card_guardrail_test.dart --reporter=compact

      - name: Accent icon box guardrails
        run: flutter test test/quality/accent_icon_box_guardrail_test.dart --reporter=compact

      - name: Segment pill audit artifact is current
        run: dart run tool/segment_pill_audit.dart --check --strict-full

      - name: Segment pill migration manifest is current
        run: dart run tool/segment_pill_manifest.dart --check

      - name: Upload segment pill audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: segment-pill-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Segment-Pill-Audit.csv
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Segment-Pill-Migration-Manifest.csv
            docs/02_FLUTTER_MIGRATION/audits/Segment-Pill-Compliance-Report.md
          if-no-files-found: error

      - name: Segment pill guardrails
        run: flutter test test/quality/segment_pill_guardrail_test.dart --reporter=compact

      - name: Top header behavior artifact is current
        run: dart run tool/top_header_behavior_audit.dart --check --strict

      - name: Upload top header behavior audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: top-header-behavior-audit
          path: docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Behavior-Audit.md
          if-no-files-found: error

      - name: Top header behavior guardrails
        run: flutter test test/quality/top_header_behavior_guardrail_test.dart --reporter=compact

      - name: Top header action artifacts are current
        run: dart run tool/top_header_action_audit.dart --check --strict

      - name: Upload top header action audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: top-header-action-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Action-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Action-Audit.csv
          if-no-files-found: error

      - name: Top header action guardrails
        run: flutter test test/quality/top_header_action_guardrail_test.dart --reporter=compact

      - name: Top header global access policy artifacts are current
        run: dart run tool/top_header_global_access_policy_audit.dart --check --strict

      - name: Upload top header global access policy audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: top-header-global-access-policy-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Global-Access-Policy-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Global-Access-Policy-Audit.csv
          if-no-files-found: error

      - name: Top header global access policy guardrails
        run: flutter test test/quality/top_header_global_access_policy_guardrail_test.dart --reporter=compact

      - name: Top header visual archetype artifacts are current
        run: dart run tool/top_header_visual_archetype_audit.dart --check --strict

      - name: Upload top header visual archetype audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: top-header-visual-archetype-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Visual-Archetype-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Top-Header-Visual-Archetype-Audit.csv
          if-no-files-found: error

      - name: Top header visual archetype guardrails
        run: flutter test test/quality/top_header_visual_guardrail_test.dart --reporter=compact

      - name: Back navigation behavior artifacts are current
        run: dart run tool/back_navigation_behavior_audit.dart --check --strict

      - name: Upload back navigation behavior audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: back-navigation-behavior-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Header-Back-Navigation-Behavior-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Header-Back-Navigation-Behavior-Audit.csv
          if-no-files-found: error

      - name: Back navigation behavior guardrails
        run: flutter test test/quality/back_navigation_behavior_guardrail_test.dart --reporter=compact

      - name: Home entry back navigation artifacts are current
        run: dart run tool/home_entry_back_navigation_audit.dart --check

      - name: Upload home entry back navigation audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: home-entry-back-navigation-audit
          path: |
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Home-Entry-Back-Navigation-Audit.md
            docs/02_FLUTTER_MIGRATION/audits/VitTrade-Home-Entry-Back-Navigation-Audit.csv
          if-no-files-found: error

      - name: Home entry back navigation guardrails
        run: flutter test test/quality/home_entry_back_navigation_guardrail_test.dart --reporter=compact

      - name: Bottom sheet usage guardrails
        run: flutter test test/quality/bottom_sheet_guardrail_test.dart --reporter=compact

      - name: Scroll physics guardrails
        run: flutter test test/quality/scroll_physics_guardrail_test.dart --reporter=compact

      - name: Scroll auto-hide guardrails
        run: flutter test test/quality/scroll_auto_hide_guardrail_test.dart --reporter=compact

      - name: High-risk state primitives guardrails
        run: flutter test test/quality/high_risk_state_primitives_guardrail_test.dart --reporter=compact

      - name: Product copy guardrails
        run: >
          flutter test
          test/quality/product_copy_guardrails_test.dart
          test/quality/trade_product_copy_guardrails_test.dart
          test/quality/prediction_product_copy_guardrails_test.dart
          test/quality/p2p_wallet_product_copy_guardrails_test.dart
          --reporter=compact

      - name: Full test suite
        run: flutter test --reporter=compact

      - name: Build debug APK
        run: flutter build apk --debug
