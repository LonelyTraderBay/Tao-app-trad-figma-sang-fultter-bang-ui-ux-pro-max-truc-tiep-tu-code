name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  flutter:
    name: Format, Analyze, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Route coverage artifact is current
        run: dart run tool/route_coverage_audit.dart --check

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --reporter=compact

      - name: Build debug APK
        run: flutter build apk --debug
