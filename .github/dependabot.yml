# CI-D4: cập nhật dependency tự động. Hai hệ sinh thái:
# - pub: flutter_app/pubspec.yaml (grouped minor/patch để đỡ nhiễu PR)
# - github-actions: nâng action đã pin SHA trong .github/workflows/
version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/flutter_app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      pub-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
