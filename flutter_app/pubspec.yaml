name: vit_trade_flutter
description: Enterprise Flutter mobile trading app for VitTrade.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  dio: ^5.10.0
  # GĐ4-F1: tầng persistence — chỉ được import bên trong lib/core/storage/
  # (guardrail runtime_seams canh); phần còn lại của app đi qua seam
  # KeyValueStore/SecureStore.
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  # GĐ4-F8: serialization pilot (ADR-010 — DTO provisional chờ contract ký)
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  # GĐ4-F8: codegen DTO — CI job static kiểm git-diff sạch sau build_runner
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  custom_lint: ^0.8.1
  vittrade_lints:
    path: tool/vittrade_lints

flutter:
  uses-material-design: true

  fonts:
    - family: Be Vietnam Pro
      fonts:
        - asset: assets/fonts/BeVietnamPro/BeVietnamPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/BeVietnamPro/BeVietnamPro-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/BeVietnamPro/BeVietnamPro-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BeVietnamPro/BeVietnamPro-Bold.ttf
          weight: 700
        - asset: assets/fonts/BeVietnamPro/BeVietnamPro-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/BeVietnamPro/BeVietnamPro-Black.ttf
          weight: 900
