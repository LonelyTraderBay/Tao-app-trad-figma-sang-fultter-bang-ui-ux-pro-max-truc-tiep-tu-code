include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - build/**
    - .dart_tool/**
    - run-artifacts/**
    - tmp/**
    - tool/vittrade_lints/**
  plugins:
    - custom_lint
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    avoid_print: true
    cancel_subscriptions: true
    close_sinks: true
    prefer_final_locals: true
    always_use_package_imports: true
    # PERF-HN6 (A-Plus GĐ3): const-hóa widget/literal bất biến — cắt rebuild
    # không cần thiết; vi phạm mới bị CI chặn qua flutter analyze.
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_literals_to_create_immutables: true
    # GĐ4-F6: bật sau khi TOÀN BỘ 422 method contract đã Future<T> (điều
    # kiện CI-D1 đặt ra từ GĐ0 — "bật cùng đợt idiom async"). Mọi Future bị
    # vứt giờ phải chọn rõ: await (đường dữ liệu) hoặc unawaited() (side
    # effect fire-and-forget có chủ đích, vd persist KeyValueStore).
    unawaited_futures: true
    discarded_futures: true
