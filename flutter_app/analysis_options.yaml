include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - build/**
    - .dart_tool/**
    - run-artifacts/**
    - tmp/**
    - tool/vittrade_lints/**
  plugins:
    - custom_lint
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    avoid_print: true
    cancel_subscriptions: true
    close_sinks: true
    prefer_final_locals: true
    always_use_package_imports: true
    # unawaited_futures / discarded_futures: deliberately NOT enabled yet.
    # Enabling them today surfaces ~723 sites (669 discarded_futures + 54
    # unawaited_futures) that each need a real judgment call (await vs.
    # unawaited()), not a mechanical fix — see ERR-35 in
    # docs/02_FLUTTER_MIGRATION/a-plus-roadmap/A-Plus-Task-Manifest.csv,
    # which establishes the app's async-error idiom. Enable these two rules
    # as part of that batch, once the idiom exists to fix violations against.
